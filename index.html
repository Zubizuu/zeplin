  <style>
    :root { color-scheme: dark; }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at 20% 20%, rgba(34,211,238,0.16), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(59,130,246,0.14), transparent 25%),
        radial-gradient(circle at 70% 80%, rgba(14,165,233,0.08), transparent 25%),
        linear-gradient(180deg, #020617 0%, #030712 42%, #020617 100%);
      min-height: 100vh;
    }
    .aurora {
      position: fixed;
      inset: auto auto 0 0;
      width: 28rem;
      height: 28rem;
      filter: blur(70px);
      border-radius: 999px;
      opacity: .22;
      pointer-events: none;
      animation: drift 16s ease-in-out infinite alternate;
      z-index: 0;
    }
    .aurora.a { top: -8rem; left: -8rem; background: #06b6d4; }
    .aurora.b { top: 8rem; right: -10rem; left: auto; background: #2563eb; animation-delay: -5s; }
    .aurora.c { bottom: -10rem; left: 30%; background: #0f766e; animation-delay: -10s; }
    @keyframes drift {
      0% { transform: translate3d(0,0,0) scale(1); }
      100% { transform: translate3d(24px,-18px,0) scale(1.12); }
    }
    @keyframes rise {
      0% { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseSoft {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,211,238,.12); }
      50% { box-shadow: 0 0 0 12px rgba(34,211,238,0); }
    }
    .rise { animation: rise .45s ease-out both; }
    .glass {
      background: rgba(2,6,23,.72);
      border: 1px solid rgba(148,163,184,.12);
      box-shadow: 0 20px 60px rgba(0,0,0,.38);
      backdrop-filter: blur(18px);
    }
    .neon-border { box-shadow: inset 0 0 0 1px rgba(34,211,238,.14), 0 0 0 1px rgba(34,211,238,.04); }
    .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(148,163,184,.34); border-radius: 999px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .tab-active {
      background: linear-gradient(135deg, rgba(6,182,212,.25), rgba(37,99,235,.28));
      color: white;
      border-color: rgba(34,211,238,.38);
    }
    .soft-input {
      background: rgba(15,23,42,.78);
      border: 1px solid rgba(148,163,184,.16);
      color: #e2e8f0;
      outline: none;
      transition: .2s ease;
    }
    .soft-input:focus { border-color: rgba(34,211,238,.65); box-shadow: 0 0 0 3px rgba(34,211,238,.12); }
    .soft-select {
      background: rgba(15,23,42,.88);
      border: 1px solid rgba(148,163,184,.16);
      color: #e2e8f0;
    }
    .sheet-a4 {
      width: 794px;
      min-height: 1123px;
      background: #fff;
      color: #111827;
      border-radius: 20px;
      overflow: hidden;
    }
    .sheet-grid {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .toast-enter { animation: rise .3s ease-out both; }
  </style>
</head>

    const firebaseConfig = {

    const defaultSettings = {

      footerNote: "Teşekkür ederiz. Parlatılmış teslimat, kusursuz izlenim.",
      logoDataUrl: "",
      commissionFixed: 0,
      commissionPercent: 10,
      services: [
        { id: "dis-yikama", name: "Dış Yıkama", category: "wash", price: 550 },
        { id: "ic-dis-detay", name: "İç Dış Detay", category: "detail", price: 1850 },
        { id: "pasta-cila", name: "Pasta Cila", category: "detail", price: 3200 },
        { id: "seramik", name: "Seramik Koruma", category: "detail", price: 7800 },
        { id: "motor", name: "Motor Temizliği", category: "detail", price: 1250 }
      ]
    };

    const state = {
      session: JSON.parse(localStorage.getItem("zd_session") || "null"),
      tab: "dashboard",
      users: [],
      records: [],
      expenses: [],
      appointments: [],
      quotes: [],
      logs: [],
      reminders: [],
      settings: defaultSettings,
      quoteDraft: null,
      pendingHistoryPlate: "",
      seedLock: false,
      newAppointmentCount: 0,
      lastAppointmentCount: 0,
      firebaseStatus: "loading"
    };

    const moneyFmt = new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 0 });
    const shortDateFmt = new Intl.DateTimeFormat("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric" });
    const dateTimeFmt = new Intl.DateTimeFormat("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });

    const $ = (sel, parent = document) => parent.querySelector(sel);
    const $$ = (sel, parent = document) => Array.from(parent.querySelectorAll(sel));
    const cssEscape = (value) => window.CSS?.escape ? CSS.escape(String(value)) : String(value).replace(/["\\]/g, "\\$&");
    const nowISO = () => new Date().toISOString();
    const uid = (prefix = "id") => `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    const esc = (v) => String(v ?? "").replace(/[&<>"]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
    const normalizePlate = (v) => String(v || "").toUpperCase().replace(/\s+/g, "").replace(/İ/g, "I").replace(/İ/g, "I");
    const normalizePhone = (v) => String(v || "").replace(/\D/g, "");

    function formatPlate(v) {
      const raw = normalizePlate(v);
      if (raw.length <= 2) return raw;
      if (raw.length <= 5) return raw.slice(0, 2) + " " + raw.slice(2);
      if (raw.length <= 7) return raw.slice(0, 2) + " " + raw.slice(2, 5) + " " + raw.slice(5);
      return raw.slice(0, 2) + " " + raw.slice(2, 5) + " " + raw.slice(5, 8);
    }

    function formatPhone(v) {
      const raw = normalizePhone(v).replace(/^90/, "").replace(/^0/, "");
      if (raw.length === 0) return "+90 ";
      if (raw.length <= 3) return "+90 " + raw;
      if (raw.length <= 6) return "+90 " + raw.slice(0, 3) + " " + raw.slice(3);
      if (raw.length <= 8) return "+90 " + raw.slice(0, 3) + " " + raw.slice(3, 6) + " " + raw.slice(6);
      return "+90 " + raw.slice(0, 3) + " " + raw.slice(3, 6) + " " + raw.slice(6, 8) + " " + raw.slice(8, 10);
    }

    function maskName(name) {
      if (!name) return "***";
      const parts = name.trim().split(/\s+/);
      return parts.map(p => p.charAt(0).toUpperCase() + '***').join(' ');
    }
    function maskPhone(phone) {
      return "+90 *** *** ** **";
    }
    function maskPlate(plate) {
      if (!plate) return "***";
      const parts = plate.trim().split(/\s+/);
      if (parts.length >= 1) return parts[0] + " *** ***";
      return "***";
    }

    const money = (v) => moneyFmt.format(Number(v || 0));
    const formatShortDate = (v) => v ? shortDateFmt.format(new Date(v)) : "-";
    const formatDateTime = (v) => v ? dateTimeFmt.format(new Date(v)) : "-";
    const openModal = (id) => { 
      try {
        console.log("Modal açılıyor:", id);
        const el = $(id); 
        if (!el) {
          console.error("Modal elementi bulunamadı:", id);
          toast("Hata", "Pencere açılamadı. Sayfayı yenileyin.", "red");

        }
        el.classList.remove("hidden"); 
        el.classList.add("flex"); 
        console.log("Modal başarıyla açıldı:", id);
      } catch (err) {
        console.error("Modal açma hatası:", err);
        toast("Hata", "Pencere açılırken hata: " + err.message, "red");
      }
    };
    const closeModal = (id) => { const el = $(id); el.classList.add("hidden"); el.classList.remove("flex"); };

    function toast(title, text, tone = "cyan") {
      const root = $("#toast-root");
      const icons = {
        cyan: "fa-circle-info",
        green: "fa-circle-check",
        red: "fa-circle-exclamation",
        amber: "fa-bell"
      };
      const colors = {
        cyan: "border-cyan-400/30 bg-cyan-900/80 text-cyan-100",
        green: "border-emerald-400/30 bg-emerald-900/80 text-emerald-100",
        red: "border-rose-400/30 bg-rose-900/80 text-rose-100",
        amber: "border-amber-400/30 bg-amber-900/80 text-amber-100"
      };
      const el = document.createElement("div");
      el.className = `toast-enter pointer-events-auto w-[min(92vw,380px)] rounded-2xl border px-4 py-3 shadow-2xl backdrop-blur-md flex items-start gap-3 ${colors[tone] || colors.cyan}`;
      el.innerHTML = `
        <div class="mt-0.5 text-xl"><i class="fa-solid ${icons[tone] || icons.cyan}"></i></div>
        <div class="min-w-0 flex-1">
          <p class="font-bold text-white text-sm">${esc(title)}</p>
          <p class="mt-0.5 text-xs text-slate-200/90 leading-relaxed">${esc(text)}</p>
        </div>
        <button class="text-slate-200/50 transition hover:text-white" aria-label="Kapat"><i class="fa-solid fa-xmark"></i></button>`;
      const closeBtn = $('button', el);
      closeBtn.addEventListener('click', () => el.remove());
      root.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(-10px)';
        setTimeout(() => el.remove(), 300);
      }, 4000);
    }

    function playNotificationSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.5);
        setTimeout(() => {
          const osc2 = audioCtx.createOscillator();
          const gain2 = audioCtx.createGain();
          osc2.connect(gain2);
          gain2.connect(audioCtx.destination);
          osc2.frequency.value = 1000;
          osc2.type = 'sine';
          gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
          osc2.start(audioCtx.currentTime);
          osc2.stop(audioCtx.currentTime + 0.5);
        }, 200);
      } catch (err) {
        console.warn('Sesli uyarı çalınamadı:', err);
      }
    }

    function serviceList() {
      return Array.isArray(state.settings?.services) && state.settings.services.length ? state.settings.services : defaultSettings.services;
    }

    function serviceMetaById(id) {
      return serviceList().find((s) => s.id === id) || serviceList().find((s) => s.name === id) || null;
    }

    function whatsappLink(phone, text) {
      const n = normalizePhone(phone || state.settings.whatsappNumber || state.settings.phone);
      const msg = text ? `?text=${encodeURIComponent(text)}` : "";
      return `https://wa.me/${n}${msg}`;
    }

    function parseDateValue(v) {
      const d = v ? new Date(v) : new Date();
      return Number.isNaN(d.getTime()) ? new Date() : d;
    }

    function recordsByPlate(plateInput) {
      const plate = normalizePlate(plateInput);
      if (!plate) return [];
      return state.records.filter((r) => normalizePlate(r.plate || r.plaka) === plate);
    }

    function categoryOf(record) {
      return record.serviceCategory || serviceMetaById(record.serviceId)?.category || (String(record.serviceName || record.service || "").toLowerCase().includes("yıkama") || String(record.serviceName || record.service || "").toLowerCase().includes("yikama") ? "wash" : "detail");
    }

    function revenueTotal() {
      return state.records.reduce((sum, r) => sum + Number(r.amount || 0), 0);
    }

    function expenseTotal() {
      return state.expenses.reduce((sum, r) => sum + Number(r.amount || 0), 0);
    }

    function netProfit() {
      return revenueTotal() - expenseTotal();
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function isToday(v) {
      return String(v || "").slice(0, 10) === todayKey();
    }

    function dueCandidates() {
      const grouped = new Map();
      state.records.forEach((r) => {
        const key = `${normalizePhone(r.phone || "")}__${normalizePlate(r.plate || "")}__${String(r.customerName || r.customer || "").trim().toLowerCase()}`;
        if (!grouped.has(key)) grouped.set(key, { ...r, lastWash: null, lastDetail: null });
        const item = grouped.get(key);
        const d = parseDateValue(r.createdAt);
        if (categoryOf(r) === "wash") {
          if (!item.lastWash || d > new Date(item.lastWash)) item.lastWash = r.createdAt;
        } else {
          if (!item.lastDetail || d > new Date(item.lastDetail)) item.lastDetail = r.createdAt;
        }
        if (!item.lastAny || d > new Date(item.lastAny)) item.lastAny = r.createdAt;
      });

      const now = Date.now();
      const list = [];
      grouped.forEach((item) => {
        if (item.lastWash) {
          const days = Math.floor((now - new Date(item.lastWash).getTime()) / 86400000);
          if (days >= 30) list.push({ ...item, reminderType: "Yıkama", overdue: days, lastDate: item.lastWash, threshold: 30 });
        }
        if (item.lastDetail) {
          const days = Math.floor((now - new Date(item.lastDetail).getTime()) / 86400000);
          if (days >= 180) list.push({ ...item, reminderType: "Detailing", overdue: days, lastDate: item.lastDetail, threshold: 180 });
        }
      });
      return list.sort((a, b) => b.overdue - a.overdue);
    }

    function generateTimeSlots() {
      const slots = [];
      const startHour = 9;
      const endHour = 19;
      for (let h = startHour; h < endHour; h++) {
        slots.push(`${String(h).padStart(2, '0')}:00`);
        slots.push(`${String(h).padStart(2, '0')}:30`);
      }
      return slots;
    }

    function getAvailableTimeSlots(dateStr) {
      const allSlots = generateTimeSlots();
      if (!dateStr) return allSlots.map((t) => ({ time: t, available: true }));
      const bookedTimes = state.appointments
        .filter((a) => a.requestedDate === dateStr && a.status !== 'İptal')
        .map((a) => a.requestedTime);
      return allSlots.map((t) => ({ time: t, available: !bookedTimes.includes(t) }));
    }

    function findNearestAvailableSlot(dateStr, requestedTime) {
      const slots = getAvailableTimeSlots(dateStr);
      const available = slots.filter((s) => s.available);
      if (available.length === 0) return null;
      const idx = available.findIndex((s) => s.time >= requestedTime);
      return idx >= 0 ? available[idx].time : available[available.length - 1].time;
    }

      if (status === "ok") {
        badgeText.textContent = "Bağlandı";
        badge.classList.add("border-green-400", "bg-green-900/60", "text-green-200");
        return;
      }
      if (status === "error") {

          badgeText.textContent = "Yetki Yok";
        } else if (state.firebaseErrorCode === "timeout") {
          badgeText.textContent = "Zaman Aşımı";

    function updateStatusSummary() {
      const container = document.getElementById("live-status-board");
      if (!container) return;
      const order = ["Sırada", "Yıkamada", "Detayda", "Cila", "Hazır", "Teslim Edildi"];
      const byStatus = (status) => state.records.filter((r) => (r.status || "Sırada") === status);
      container.innerHTML = `
        <div class="grid gap-4 lg:grid-cols-2 2xl:grid-cols-3">
          ${order.map((status) => {
            const items = byStatus(status).slice(0, 6);
            return `
              <div class="rounded-3xl border border-slate-800 bg-slate-950/55 p-4">
                <div class="flex items-center justify-between gap-2">
                  <h3 class="font-semibold text-white">${esc(status)}</h3>
                  <span class="rounded-full border border-slate-800 px-2 py-0.5 text-xs text-slate-300">${items.length}</span>
                </div>
                <div class="mt-4 space-y-3 max-h-72 overflow-auto pr-1 scrollbar-thin">
                  ${items.length ? items.map((r) => renderRecordMini(r)).join("") : `<div class="rounded-2xl border border-dashed border-slate-800 bg-slate-950/40 px-4 py-5 text-sm text-slate-400">Henüz kayıt yok.</div>`}
                </div>
              </div>`;
          }).join("")}
        </div>`;
    }

    function renderRecordMini(r) {
      const statusTone = {
        "Sırada": "text-sky-300 border-sky-400/20 bg-sky-400/10",
        "Yıkamada": "text-cyan-300 border-cyan-400/20 bg-cyan-400/10",
        "Detayda": "text-violet-300 border-violet-400/20 bg-violet-400/10",
        "Cila": "text-amber-300 border-amber-400/20 bg-amber-400/10",
        "Hazır": "text-emerald-300 border-emerald-400/20 bg-emerald-400/10",
        "Teslim Edildi": "text-slate-300 border-slate-600 bg-slate-900/50"
      }[r.status || "Sırada"] || "text-slate-300 border-slate-600 bg-slate-900/50";
      return `
        <div class="rounded-3xl border border-slate-800 bg-slate-950/60 p-4 ${r.status === 'Hazır' ? 'animate-[pulseSoft_2.2s_ease-in-out_infinite]' : ''}">
          <div class="flex items-start justify-between gap-3">
            <div>
              <p class="font-semibold text-white">${esc(r.plate || r.plaka || '-')} <span class="text-slate-400">·</span> ${esc(r.customerName || r.customer || '-')}</p>

    let financeChartInstance = null;

    function renderDailyReport() {
      const container = document.getElementById("daily-report-table");
      if (!container) return;
      const grouped = new Map();
      [...state.records].forEach((r) => {
        const day = String(r.createdAt || nowISO()).slice(0, 10);
        if (!grouped.has(day)) grouped.set(day, { day, income: 0, count: 0 });
        const row = grouped.get(day);
        row.income += Number(r.amount || 0);
        row.count += 1;
      });
      
      // Prepare chart data (last 7 days)
      const last7Days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        last7Days.push(d.toISOString().slice(0, 10));
      }
      
      const incomeData = last7Days.map(day => {
        return state.records.filter(r => String(r.createdAt || "").slice(0, 10) === day).reduce((s, r) => s + Number(r.amount || 0), 0);
      });
      const expenseData = last7Days.map(day => {
        return state.expenses.filter(e => String(e.createdAt || e.date || "").slice(0, 10) === day).reduce((s, e) => s + Number(e.amount || 0), 0);
      });

      // Render Chart
      const ctx = document.getElementById("finance-chart");
      if (ctx) {
        if (financeChartInstance) financeChartInstance.destroy();
        financeChartInstance = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: last7Days.map(d => d.slice(5)), // MM-DD
            datasets: [
              { label: 'Gelir', data: incomeData, backgroundColor: '#22d3ee', borderRadius: 4 },
              { label: 'Gider', data: expenseData, backgroundColor: '#f43f5e', borderRadius: 4 }

            responsive: true,
            plugins: { legend: { labels: { color: '#cbd5e1' } } },

              y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
              x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
            }
          }

      const rows = Array.from(grouped.values()).sort((a, b) => b.day.localeCompare(a.day)).slice(0, 12);
      container.innerHTML = rows.length ? `

            </tr></thead>

              const dayExpenses = state.expenses.filter((e) => String(e.createdAt || e.date || "").slice(0, 10) === r.day).reduce((s, e) => s + Number(e.amount || 0), 0);
              return `<tr>
                <td class="px-4 py-3 text-white">${esc(r.day)}</td>

                <td class="px-4 py-3 text-cyan-200">${money(r.income)}</td>
                <td class="px-4 py-3 text-rose-200">${money(dayExpenses)}</td>

    async function exportBackup() {
      toast("Yedekleniyor...", "Veriler hazırlanıyor, lütfen bekleyin.", "cyan");
      const backup = {
        tarih: nowISO(),
        firma: state.settings,
        kayitlar: state.records,
        randevular: state.appointments,
        giderler: state.expenses,
        teklifler: state.quotes,
        hatirlatmalar: state.reminders,
        kullanicilar: state.users
      };
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `zeplin-yedek-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      toast("Yedek Tamamlandı", "Tüm veriler başarıyla indirildi.", "green");
      await logActivity("Yedek Alma", "Sistem yedeği JSON olarak indirildi.");
    }

    function downloadCSV(filename, rows) {
      if (!rows.length) {
        toast("Kayıt bulunamadı", "Aktarılacak veri yok.", "amber");
        return;
      }
      const headers = Object.keys(rows[0]);
      const csv = [headers.join(","), ...rows.map((row) => headers.map((h) => `"${String(row[h] ?? "").replace(/"/g, '""')}"`).join(","))].join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

    function exportReportCSV() {
      const rows = [];
      const grouped = new Map();
      state.records.forEach((r) => {
        const day = String(r.createdAt || nowISO()).slice(0, 10);
        if (!grouped.has(day)) grouped.set(day, { day, count: 0, income: 0, expense: 0 });
        const o = grouped.get(day);
        o.count += 1;
        o.income += Number(r.amount || 0);
      });
      Array.from(grouped.values()).sort((a, b) => b.day.localeCompare(a.day)).slice(0, 30).forEach((r) => {
        r.expense = state.expenses.filter((e) => String(e.createdAt || e.date || "").slice(0, 10) === r.day).reduce((s, e) => s + Number(e.amount || 0), 0);
        rows.push({ gün: r.day, kayıt: r.count, ciro: r.income, gider: r.expense, net: r.income - r.expense });
      });
      downloadCSV("canli-rapor.csv", rows);
    }

    async function downloadQuotePdf() {
      console.log("PDF indirme başlatıldı...", state.quoteDraft);
      if (!state.quoteDraft) {
        toast("Hata", "Önce teklif oluşturmalısınız.", "red");
        return;
      }
      try {
        toast("PDF Hazırlanıyor...", "Lütfen bekleyin, PDF oluşturuluyor.", "cyan");
        const element = document.getElementById("quote-sheet-preview");
        if (!element) {
          toast("Hata", "Önizleme elementi bulunamadı. Teklifi tekrar oluşturun.", "red");
          return;
        }
        
        // Elementin görünür ve dolu olduğunu kontrol et
        if (element.offsetWidth === 0 || element.offsetHeight === 0) {
          toast("Hata", "Önizleme alanı görünür değil. Lütfen bekleyin ve tekrar deneyin.", "red");
          return;
        }
        
        if (element.innerHTML.trim() === '') {
          toast("Hata", "Önizleme içeriği boş. Teklifi tekrar oluşturun.", "red");
          return;
        }
        
        if (typeof html2pdf === 'undefined') {
          toast("Hata", "PDF kütüphanesi yüklenemedi. Sayfayı yenileyin.", "red");
          return;
        }
        
        // Dosya adını güvenli hale getir
        const safeFileName = (state.quoteDraft.quoteNo || 'teklif').replace(/[^a-zA-Z0-9-_]/g, '_');
        
        const opt = {
          margin: 10,
          filename: `${safeFileName}.pdf`,
          image: { type: "jpeg", quality: 0.95 },
          html2canvas: { 
            scale: 2, 
            useCORS: true, 
            allowTaint: true,
            backgroundColor: "#ffffff",
            logging: true,
            letterRendering: true
          },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
        };
        
        console.log("PDF oluşturuluyor:", safeFileName);
        
        // html2pdf çağrısı
        const worker = html2pdf().set(opt).from(element);
        await worker.save();
        
        console.log("PDF başarıyla indirildi");
        toast("PDF İndirildi", `${safeFileName}.pdf başarıyla indirildi.`, "green");
        await logActivity("PDF İndirme", `${safeFileName} numaralı teklif PDF olarak indirildi.`);
      } catch (err) {
        console.error("PDF Hatası:", err);
        console.error("Hata detayı:", err.stack);
        toast("PDF Hatası", "PDF oluşturulurken hata: " + (err.message || "Bilinmeyen hata"), "red");
      }
    }

    async function shareQuoteWhatsApp() {
      const quote = state.quoteDraft;
      if (!quote) return;
      const el = document.getElementById("quote-sheet-preview");
      const desktopWhatsAppWindow = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent) ? null : window.open("about:blank", "_blank");
      const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", 0.95));
      if (!blob) {
        toast("Paylaşım başarısız", "Görsel oluşturulamadı.", "red");
        return;
      }
      const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent);
      try {
        if (isMobile && navigator.share) {
          const file = new File([blob], `${quote.quoteNo}.jpg`, { type: "image/jpeg" });
          await navigator.share({ title: `Teklif ${quote.quoteNo}`, text: `Teklif ${quote.quoteNo}`, files: [file] });
          toast("Paylaşım hazır", "Görsel doğrudan paylaşım menüsüne gönderildi.", "green");
          return;
        }
      } catch (err) {
        console.warn(err);
      }
      try {
        if (navigator.clipboard && window.ClipboardItem) {
          await navigator.clipboard.write([new ClipboardItem({ "image/jpeg": blob })]);
          toast("Panoya kopyalandı", "Görsel clipboard'a alındı. WhatsApp sohbetine yapıştırabilirsiniz.", "green");
        } else {
          toast("Kopyalama desteği sınırlı", "Tarayıcı clipboard görsel kopyalamayı desteklemiyor.", "amber");
        }
      } catch (err) {
        console.warn(err);
        toast("Panoya kopyalanamadı", "Tarayıcı izin vermedi. Dosya indirildi.", "amber");
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${quote.quoteNo}.jpg`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1200);
      }
      const waUrl = whatsappLink(quote.phone, `Merhaba ${quote.customerName}, teklifiniz hazır. Teklif No: ${quote.quoteNo}. Görsel panoya kopyalandı, WhatsApp sohbetine yapıştırabilirsiniz.`);
      if (desktopWhatsAppWindow) {
        desktopWhatsAppWindow.location.href = waUrl;
      } else {
        window.open(waUrl, "_blank", "noopener,noreferrer");
      }
    }

        const sid = $("[name='serviceId']", row)?.value;

      }).filter((i) => i.description);
      
      if (items.length === 0) {
        toast("Eksik Bilgi", "Lütfen geçerli bir hizmet seçin.", "amber");
        return;
      }
      
      const total = items.reduce((s, i) => s + Number(i.qty || 0) * Number(i.unitPrice || 0), 0);
      const quote = {
        quoteNo: `PRF-${new Date().toISOString().slice(0,10).replace(/-/g, '')}-${Date.now().toString().slice(-5)}`,

        items,
        total,
        notes: String(data.get("notes") || "").trim(),

    function nextStatus(current) {

      return order[Math.min(order.length - 1, idx + 1)];
    }

    function prevStatus(current) {
      const order = ["Sırada", "Yıkamada", "Detayda", "Cila", "Hazır", "Teslim Edildi"];
      const idx = Math.max(0, order.indexOf(current || "Sırada"));
      return order[Math.max(0, idx - 1)];
    }

          if (state.tab === "dashboard") renderDashboardDataOnly();
          if (state.tab === "records") renderRecordsTable();
          if (state.tab === "finance") renderFinanceTables();
          if (state.tab === "reports") renderDailyReport();
          if (state.tab === "reminders") { renderReminderList(); renderAllRemindersList(); }
          if (state.tab === "quote") renderQuoteHistory();
        }
      }, (err) => { markFirebaseError(err); console.warn("records snapshot", err); });

      onSnapshot(query(collection(db, "giderler"), orderBy("createdAt", "desc")), (snap) => {
        markFirebaseConnected();
        state.expenses = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        if (state.session && state.tab === "finance") { renderFinanceTables(); renderExpenseList(); }
        if (state.session && state.tab === "reports") renderDailyReport();
        renderSummaryCards();
      }, (err) => { markFirebaseError(err); console.warn("expenses snapshot", err); });

      onSnapshot(query(collection(db, "randevular"), orderBy("createdAt", "desc")), (snap) => {
        markFirebaseConnected();
        const newCount = snap.docs.length;
        state.appointments = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        updatePublicAppointments();
        if (state.session && state.lastAppointmentCount > 0 && newCount > state.lastAppointmentCount) {
          const newAppointments = newCount - state.lastAppointmentCount;
          state.newAppointmentCount += newAppointments;
          toast("🔔 Yeni Randevu!", `${newAppointments} yeni randevu talebi geldi.`, "amber");
          playNotificationSound();
        }
        state.lastAppointmentCount = newCount;
        if (state.session && state.tab === "dashboard") renderDashboardDataOnly();
        if (state.session && state.tab === "appointments") renderAppointmentsTable();
      }, (err) => { markFirebaseError(err); console.warn("appointments snapshot", err); });

      onSnapshot(query(collection(db, "teklifler"), orderBy("createdAt", "desc")), (snap) => {
        markFirebaseConnected();
        state.quotes = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        if (state.session && state.tab === "quote") renderQuoteHistory();
      }, (err) => { markFirebaseError(err); console.warn("quotes snapshot", err); });

      onSnapshot(query(collection(db, "aktiviteler"), orderBy("createdAt", "desc")), (snap) => {
        markFirebaseConnected();
        state.logs = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        if (state.session && state.tab === "logs") renderLogsTable(state.logs);
      }, (err) => { markFirebaseError(err); console.warn("logs snapshot", err); });

      onSnapshot(query(collection(db, "hatirlatmalar"), orderBy("createdAt", "desc")), (snap) => {
        markFirebaseConnected();
        state.reminders = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        if (state.session && state.tab === "reminders") {
          renderReminderList();
          renderAllRemindersList();
        }
      }, (err) => { markFirebaseError(err); console.warn("reminders snapshot", err); });

      onSnapshot(doc(db, "ayarlar", "genel"), (snap) => {
        markFirebaseConnected();
        state.settings = snap.exists() ? { ...defaultSettings, ...snap.data() } : { ...defaultSettings };
        updatePublicServiceSelect();
        updateStaffServiceSelects();
        if (state.session && state.tab === "settings") {
          renderAll();
          return;
        }
        renderSummaryCards();
        updatePublicAppointments();
        updateStatusSummary();
        if (!state.session) renderShell();
      }, (err) => { markFirebaseError(err); console.warn("settings snapshot", err); });
    }

    function renderDashboardDataOnly() {
      renderSummaryCards();
      updateStatusSummary();
      updateMaintenanceBook();
      updatePublicAppointments();
    }

    function clearNewAppointmentBadge() {
      if (state.newAppointmentCount > 0) {
        state.newAppointmentCount = 0;
        renderShell();
      }
    }

    function attemptLogin() {
      const username = String(document.getElementById("login-username")?.value || "").trim().toLowerCase();
      const password = String(document.getElementById("login-password")?.value || "").trim();
      const found = state.users.find((u) => String(u.username || "").toLowerCase() === username && String(u.password || "") === password);
      if (found) {
        closeModal("#login-modal");
        loginUser(found.username, found.role || "Personel");
        return;
      }
      if (state.users.length === 0 && (username === "admin" || username === "personel") && password === "7538") {
        closeModal("#login-modal");
        loginUser(username, username === "admin" ? "Yönetici" : "Personel");
        return;
      }
      const error = document.getElementById("login-error");
      error.textContent = "Kullanıcı adı veya şifre hatalı.";
      error.classList.remove("hidden");
    }

    function addQuoteRow() {
      const container = document.getElementById("quote-lines");
      if (!container) return;
      const index = container.children.length;
      const div = document.createElement("div");
      div.innerHTML = quoteLineRowHTML(index);
      container.appendChild(div.firstElementChild);
    }

    function removeQuoteRow(btn) {
      const row = btn.closest(".quote-line");
      const container = document.getElementById("quote-lines");
      if (row && container && container.children.length > 1) row.remove();
    }

    function addServiceRow() {
      const container = document.getElementById("settings-services");
      if (!container) return;
      const index = container.children.length;
      const div = document.createElement("div");
      div.className = "grid gap-3 rounded-3xl border border-slate-800 bg-slate-950/55 p-4 sm:grid-cols-[1.1fr_.8fr_.7fr_auto] sm:items-center";
      div.dataset.serviceId = "";
      div.innerHTML = `
        <input data-service-field="name" data-index="${index}" class="soft-input rounded-2xl px-4 py-3" value="" placeholder="Hizmet adı" />
        <select data-service-field="category" data-index="${index}" class="soft-select rounded-2xl px-4 py-3">
          <option value="wash">Yıkama</option>
          <option value="detail">Detay</option>
        </select>
        <input data-service-field="price" data-index="${index}" type="number" min="0" class="soft-input rounded-2xl px-4 py-3" value="0" placeholder="Fiyat" />
        <button type="button" data-action="remove-service-row" data-index="${index}" class="rounded-2xl border border-rose-500/30 px-4 py-3 text-sm text-rose-200 transition hover:border-rose-400 hover:text-rose-100">Sil</button>`;
      container.appendChild(div);
    }

    function removeServiceRow(btn) {
      const container = document.getElementById("settings-services");
      const row = btn.closest(".grid[data-index]");
      if (row && container && container.children.length > 1) row.remove();
    }

    function openReadyWhatsapp(id) {
      const record = state.records.find((r) => r.id === id);
      if (!record) return;
      const text = `Merhaba ${record.customerName || ''}, aracınız ${state.settings.companyName || defaultSettings.companyName} tarafından hazırlandı. Plaka: ${record.plate || ''}. Teslim için uygun olduğunuzda bize ulaşabilirsiniz.`;
      window.open(whatsappLink(record.phone, text), "_blank", "noopener,noreferrer");
    }

    function showCustomerHistory(plate) {
      const history = recordsByPlate(plate).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      const modal = document.getElementById("customer-modal");
      const title = document.getElementById("customer-modal-title");
      const content = document.getElementById("customer-modal-content");
      
      if (history.length === 0) return;
      
      const customer = history[0];
      title.textContent = `${customer.customerName} - ${customer.plate} Geçmişi`;
      
      const totalSpent = history.reduce((s, r) => s + Number(r.amount || 0), 0);
      
      content.innerHTML = `
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <div class="rounded-2xl border border-slate-800 bg-slate-950/50 p-4">
            <p class="text-xs text-slate-400">Toplam Ziyaret</p>
            <p class="text-xl font-bold text-white">${history.length}</p>
          </div>
          <div class="rounded-2xl border border-slate-800 bg-slate-950/50 p-4">
            <p class="text-xs text-slate-400">Toplam Harcama</p>
            <p class="text-xl font-bold text-cyan-200">${money(totalSpent)}</p>
          </div>
          <div class="rounded-2xl border border-slate-800 bg-slate-950/50 p-4">
            <p class="text-xs text-slate-400">Telefon</p>
            <p class="text-sm font-bold text-white mt-1">${esc(customer.phone)}</p>
          </div>
          <div class="rounded-2xl border border-slate-800 bg-slate-950/50 p-4">
            <p class="text-xs text-slate-400">Araç</p>
            <p class="text-sm font-bold text-white mt-1">${esc(customer.vehicle || '-')}</p>
          </div>
        </div>
        <div class="space-y-3">
          ${history.map((r) => `
            <div class="rounded-2xl border border-slate-800 bg-slate-950/40 p-4 flex flex-wrap justify-between items-center gap-4">
              <div>
                <p class="text-sm font-semibold text-white">${esc(r.serviceName || '-')} <span class="text-slate-500 mx-2">|</span> ${formatShortDate(r.createdAt)}</p>
                <p class="text-xs text-slate-400 mt-1">Personel: ${esc(r.staffName || '-')}</p>
              </div>
              <div class="flex items-center gap-4">
                <span class="rounded-full border border-slate-700 px-3 py-1 text-xs text-slate-300">${esc(r.status || 'Sırada')}</span>
                <span class="font-bold text-cyan-200">${money(r.amount)}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function openEditRecordModal(id) {
      const record = state.records.find(r => r.id === id);
      if (!record) return;
      
      document.getElementById("edit-record-id").value = record.id;
      document.getElementById("edit-plate").value = record.plate || '';
      document.getElementById("edit-customerName").value = record.customerName || '';
      document.getElementById("edit-phone").value = record.phone || '';
      document.getElementById("edit-vehicle").value = record.vehicle || '';
      document.getElementById("edit-amount").value = record.amount || 0;
      document.getElementById("edit-status").value = record.status || 'Sırada';
      document.getElementById("edit-staffName").value = record.staffName || '';
      document.getElementById("edit-notes").value = record.notes || '';
      
      const serviceSelect = document.getElementById("edit-service-select");
      serviceSelect.innerHTML = serviceList().map(s => `<option value="${esc(s.id)}">${esc(s.name)}</option>`).join("");
      if (record.serviceId) serviceSelect.value = record.serviceId;
      
      openModal("#edit-record-modal");
    }

    async function submitEditRecord(form) {
      const data = new FormData(form);
      const id = data.get("id");
      const serviceId = data.get("serviceId");
      const service = serviceMetaById(serviceId);
      
      const payload = {
        plate: String(data.get("plate") || "").trim().toUpperCase(),
        customerName: String(data.get("customerName") || "").trim(),
        phone: String(data.get("phone") || "").trim(),
        vehicle: String(data.get("vehicle") || "").trim(),
        serviceId,
        serviceName: service?.name || "",
        serviceCategory: service?.category || "detail",
        amount: Number(data.get("amount") || 0),
        status: String(data.get("status") || "Sırada"),
        staffName: String(data.get("staffName") || "").trim(),
        notes: String(data.get("notes") || "").trim(),
        updatedAt: nowISO()
      };
      
      await updateDoc(doc(db, "kayitlar", id), payload);
      await logActivity("Kayıt Düzenleme", `${payload.plate} plakalı araç kaydı güncellendi.`);
      closeModal("#edit-record-modal");
      toast("Kayıt Güncellendi", "Araç kaydı başarıyla güncellendi.", "green");
    }

    function maybeSetCurrentHistoryPlate(v) {
      state.pendingHistoryPlate = v;
      updateMaintenanceBook();
    }

    function handleInput(e) {
      const t = e.target;
      if (!(t instanceof HTMLElement)) return;
      if (t.id === "history-plate-input" || t.id === "plate-input") maybeSetCurrentHistoryPlate(t.value);
      if (t.matches("#records-search")) renderRecordsTable();
      if (t.matches("[data-user-password], [data-user-role]")) return;
      if (t.matches("[data-service-field='name'], [data-service-field='price'], [data-service-field='category']")) return;
      if (t.matches("[name='plate']") && document.getElementById("history-strip")) maybeSetCurrentHistoryPlate(t.value);

      // Tarih seçildiğinde saat listesini güncelle
      if (t.name === "date" && t.value) {
        updatePublicTimeSelect(t.value);
      }

      // Plaka otomatik formatlama
      if (t.name === "plate" && t.value) {
        const cursorPos = t.selectionStart;
        const oldLength = t.value.length;
        const formatted = formatPlate(t.value);
        if (formatted !== t.value) {
          t.value = formatted;
          const newLength = formatted.length;
          const diff = newLength - oldLength;
          t.setSelectionRange(cursorPos + diff, cursorPos + diff);
        }
      }

      // Telefon otomatik formatlama (+90 sabit)
      if (t.name === "phone" && t.value) {
        const cursorPos = t.selectionStart;
        const oldLength = t.value.length;
        const formatted = formatPhone(t.value);
        if (formatted !== t.value) {
          t.value = formatted;
          const newLength = formatted.length;
          const diff = newLength - oldLength;
          t.setSelectionRange(cursorPos + diff, cursorPos + diff);
        }
      }
    }

    function handleChange(e) {
      const t = e.target;
      if (!(t instanceof HTMLElement)) return;
      if (t.id === "service-select") {
        const s = serviceMetaById(t.value);
        const amountField = document.querySelector('#vehicle-intake-form [name="amount"]');
        if (amountField && s) {
          amountField.value = s.price;
          toast("Tutar Güncellendi", `${s.name} için tutar otomatik olarak ${money(s.price)} olarak ayarlandı.`, "cyan");
        }
      }
      if (t.id === "edit-service-select") {
        const s = serviceMetaById(t.value);
        const amountField = document.getElementById("edit-amount");
        if (amountField && s) amountField.value = s.price;
      }
      if (t.id === "appointment-selector" && t.value) {
        const appt = state.appointments.find(a => a.id === t.value);
        if (appt) {
          document.querySelector('#vehicle-intake-form [name="plate"]').value = appt.plate || '';
          document.querySelector('#vehicle-intake-form [name="customerName"]').value = appt.name || '';
          document.querySelector('#vehicle-intake-form [name="phone"]').value = appt.phone || '';
          document.querySelector('#vehicle-intake-form [name="vehicle"]').value = appt.vehicle || '';
          const serviceSelect = document.querySelector('#vehicle-intake-form [name="serviceId"]');
          if (serviceSelect && appt.serviceId) {
            serviceSelect.value = appt.serviceId;
            const amountField = document.querySelector('#vehicle-intake-form [name="amount"]');
            const s = serviceMetaById(appt.serviceId);
            if (amountField && s) amountField.value = s.price;
          }
        }
      }
      if (t.matches("#quote-lines [name='serviceId']")) {
        const row = t.closest('.quote-line');
        const s = serviceMetaById(t.value);
        if (row && s) {
          const price = row.querySelector('[name="unitPrice"]');
          if (price) price.value = s.price;
        }
      }
    }

    async function handleClick(e) {
      const btn = e.target.closest("button, a");
      if (!btn) return;
      const action = btn.dataset.action || btn.id || btn.getAttribute("id");
      
      // Debug: Buton tıklamalarını logla
      if (btn.id && (btn.id.includes('pdf') || btn.id.includes('jpeg') || btn.id.includes('whatsapp'))) {
        console.log("Buton tıklandı:", btn.id, "Action:", action);
      }
      if (btn.id === "open-login") {
        document.getElementById("login-error").classList.add("hidden");
        openModal("#login-modal");
        return;
      }
      if (btn.id === "close-login") { closeModal("#login-modal"); return; }
      if (btn.id === "close-quote") { closeModal("#quote-modal"); return; }
      if (btn.id === "close-customer-modal") { 
        const modal = document.getElementById("customer-modal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        return; 
      }
      if (btn.id === "close-edit-record-modal" || btn.id === "cancel-edit-record") { 
        closeModal("#edit-record-modal");
        return; 
      }
      if (btn.id === "logout-btn") { logoutUser(); return; }
      if (btn.dataset.tab) { state.tab = btn.dataset.tab; clearNewAppointmentBadge(); renderAll(); return; }
      if (action === "export-records-csv") { exportRecordsCSV(); return; }
      if (action === "export-expenses-csv") { exportExpensesCSV(); return; }
      if (action === "export-report-csv") { exportReportCSV(); return; }
      if (action === "show-customer-history") { showCustomerHistory(btn.dataset.plate); return; }
      if (action === "approve-appointment") { await updateDoc(doc(db, "randevular", btn.dataset.id), { status: 'Onaylandı' }); await logActivity("Randevu Onaylama", `${btn.dataset.id} ID'li randevu onaylandı.`); toast("Randevu Onaylandı", "Müşteriye bilgi verilebilir.", "green"); return; }
      if (action === "reject-appointment") { await updateDoc(doc(db, "randevular", btn.dataset.id), { status: 'Reddedildi' }); await logActivity("Randevu Reddetme", `${btn.dataset.id} ID'li randevu reddedildi.`); toast("Randevu Reddedildi", "Randevu iptal edildi.", "red"); return; }
      if (action === "cancel-appointment") { await updateDoc(doc(db, "randevular", btn.dataset.id), { status: 'İptal' }); await logActivity("Randevu İptal", `${btn.dataset.id} ID'li randevu iptal edildi.`); toast("Randevu İptal Edildi", "Randevu iptal edildi.", "amber"); return; }
      if (action === "delete-record") { if(!confirm("Bu kaydı silmek istediğinize emin misiniz?")) return; await deleteDoc(doc(db, "kayitlar", btn.dataset.id)); await logActivity("Kayıt Silme", `${btn.dataset.id} ID'li kayıt silindi.`); toast("Kayıt Silindi", "Kayıt başarıyla silindi.", "red"); return; }
      if (action === "edit-record") { openEditRecordModal(btn.dataset.id); return; }
      if (action === "send-reminder") { 
        const phone = normalizePhone(btn.dataset.phone);
        const text = btn.dataset.text;
        window.open(whatsappLink(phone, text), "_blank", "noopener,noreferrer");
        await logActivity("WhatsApp Hatırlatma", `${btn.dataset.phone} numarasına randevu hatırlatma mesajı gönderildi.`);
        return; 
      }
      if (action === "status-next") { const r = state.records.find((x) => x.id === btn.dataset.id); if (r) await updateRecordStatus(r.id, nextStatus(r.status)); return; }
      if (action === "status-prev") { const r = state.records.find((x) => x.id === btn.dataset.id); if (r) await updateRecordStatus(r.id, prevStatus(r.status)); return; }
      if (action === "open-ready-whatsapp") { openReadyWhatsapp(btn.dataset.id); return; }
      if (action === "save-user") { await saveUser(btn.dataset.id); return; }
      if (action === "delete-user") { await deleteUser(btn.dataset.id); return; }
      if (action === "add-quote-row") { addQuoteRow(); return; }
      if (action === "remove-quote-row") { removeQuoteRow(btn); return; }
      if (action === "add-service-row") { addServiceRow(); return; }
      if (action === "remove-service-row") { removeServiceRow(btn); return; }
      if (btn.id === "download-quote-pdf") { await downloadQuotePdf(); return; }
      if (btn.id === "download-quote-jpeg") { await downloadQuoteJpeg(); return; }
      if (btn.id === "share-quote-whatsapp") { await shareQuoteWhatsApp(); return; }
      if (action === "export-backup") { await exportBackup(); return; }
      if (action === "filter-reminders") { currentReminderFilter = btn.dataset.filter; renderAllRemindersList(); return; }
      if (action === "mark-reminder-sent") { await markReminderSent(btn.dataset.id); return; }
      if (action === "delete-reminder") { await deleteReminder(btn.dataset.id); return; }
    }

    async function handleSubmit(e) {
      const form = e.target;
      if (!(form instanceof HTMLFormElement)) return;
      e.preventDefault();
      if (form.id === "login-form") { attemptLogin(); return; }
      if (form.id === "customer-booking-form") { await submitCustomerBooking(form); return; }
      if (form.id === "vehicle-intake-form") { await submitVehicleIntake(form); return; }
      if (form.id === "expense-form") { await submitExpense(form); return; }
      if (form.id === "user-form") { await submitUser(form); return; }
      if (form.id === "settings-form") { await submitSettings(form); return; }
      if (form.id === "quote-form") { await submitQuote(form); return; }
      if (form.id === "edit-record-form") { await submitEditRecord(form); return; }
      if (form.id === "manual-reminder-form") { await submitManualReminder(form); return; }
    }

    document.addEventListener("click", (e) => handleClick(e));
    document.addEventListener("input", (e) => handleInput(e));
    document.addEventListener("change", (e) => handleChange(e));
    document.addEventListener("submit", (e) => handleSubmit(e));

    async function init() {
      renderAll();
      setupSnapshots();
      setTimeout(() => {
        if (state.firebaseStatus === "loading") {
          markFirebaseError({ code: "timeout" });
          console.warn("Firebase bağlantı zaman aşımı: snapshot geri dönüşü alınamadı.");
        }
      }, 12000);
      if (state.session && state.users.length && !state.users.some((u) => u.username === state.session.username)) {
        state.session = null;
        localStorage.removeItem("zd_session");
        renderAll();
      }
      if (state.session) {
        toast("Oturum yüklendi", `${state.session.username} olarak devam ediliyor.`, "cyan");
      }
    }

    init();
  </script>
</body>
</html>
